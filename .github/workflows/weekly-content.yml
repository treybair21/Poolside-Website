name: Weekly Content Generation

on:
  # Runs every Monday at 9am Central (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      content_type:
        description: 'What type of content to generate'
        required: true
        default: 'blog'
        type: choice
        options:
          - blog
          - city-page
          - both

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Determine content type
        id: content-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.content_type }}" >> $GITHUB_OUTPUT
          else
            # Alternate between blog and city pages each week
            WEEK_NUM=$(date +%V)
            if [ $((WEEK_NUM % 2)) -eq 0 ]; then
              echo "type=blog" >> $GITHUB_OUTPUT
            else
              echo "type=city-page" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate content with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONTENT_TYPE="${{ steps.content-type.outputs.type }}"
          BRANCH_NAME="content/auto-$(date +%Y%m%d)-${CONTENT_TYPE}"

          git checkout -b "$BRANCH_NAME"

          claude -p "$(cat .github/prompts/generate-content.md)

          CONTENT_TYPE: ${CONTENT_TYPE}

          Instructions:
          1. Read content-calendar.json to find the next 'pending' item for this content type
          2. Read CLAUDE.md for site standards and business facts
          3. Use an existing article as a template (read /blog/how-to-sell-a-pool-route.html)
          4. Create the new content following all patterns exactly
          5. Add the new page card to blog.html (if blog article)
          6. Add the URL to sitemap.xml
          7. Update the item's status to 'in-review' in content-calendar.json
          8. Stage and commit all changes with a descriptive message" \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git add *),Bash(git commit *)"

          git push -u origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT_TYPE="${{ steps.content-type.outputs.type }}"
          BRANCH_NAME="content/auto-$(date +%Y%m%d)-${CONTENT_TYPE}"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "📝 New ${CONTENT_TYPE} content - $(date +%B' '%d)" \
            --body "## Auto-Generated Content

          This PR was automatically generated by the weekly content pipeline.

          **Content type:** ${CONTENT_TYPE}
          **Generated:** $(date +%Y-%m-%d)

          ### Review checklist
          - [ ] Content is accurate and matches our business facts
          - [ ] Numbers are correct (60 account max, 20% chemicals, etc.)
          - [ ] Links work correctly
          - [ ] SEO meta tags look good
          - [ ] CTA sections are present
          - [ ] Sitemap was updated

          *Review and merge when ready. The content will go live on your next deploy.*"
