<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes for Sale - Poolside Business Brokers</title>
    <meta name="description" content="Browse available pool routes for sale nationwide. Find established pool service businesses with verified accounts, strong customer retention, and growth potential.">
    <meta name="keywords" content="pool routes for sale, buy pool route, pool service business for sale, Texas pool routes, Florida pool routes, Arizona pool routes, California pool routes">
    <link rel="canonical" href="https://poolsidebrokers.com/routes-for-sale">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://poolsidebrokers.com/routes-for-sale">
    <meta property="og:title" content="Pool Routes for Sale | Poolside Business Brokers">
    <meta property="og:description" content="Browse available pool routes for sale with verified accounts and strong customer retention.">
    <meta property="og:image" content="https://poolsidebrokers.com/Poolside-Business-Brokers-Team-Photo.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pool Routes for Sale | Poolside Business Brokers">
    <meta name="twitter:description" content="Browse available pool routes for sale with verified accounts and strong customer retention.">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8V7FH38J0R"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8V7FH38J0R');
    </script>

    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .filters {
            background: white;
            padding: 28px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 28px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 16px;
            margin-bottom: 16px;
            align-items: end;
        }

        .filter-row.second-row { grid-template-columns: 2fr 2fr 1fr; }

        .filter-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: 600; margin-bottom: 6px; color: #1a202c; font-size: 0.9em; }

        .filter-group input,
        .filter-group select {
            padding: 10px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95em;
            transition: border-color 0.2s;
            background: white;
            color: #1a202c;
            font-family: inherit;
        }

        .filter-group input:focus,
        .filter-group select:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }

        .reset-btn {
            padding: 10px 24px;
            background: #1a202c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
            height: 42px;
            font-family: inherit;
        }

        .reset-btn:hover { background: #2d3748; }

        .results-count { color: #4a5568; font-size: 1.05em; margin-bottom: 20px; text-align: center; font-weight: 500; }

        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .route-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .route-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

        .route-header {
            background: #1a202c;
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .listing-id-container { display: flex; flex-direction: column; }
        .listing-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 4px; }
        .listing-id { font-size: 1.05em; font-weight: 700; }

        .price-container { display: flex; flex-direction: column; align-items: flex-end; }
        .price-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 4px; }
        .price { font-size: 1.5em; font-weight: 800; }

        .route-body { padding: 24px; }

        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            gap: 12px;
        }

        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-weight: 600; color: #4a5568; font-size: 0.9em; }
        .detail-value { font-weight: 600; color: #1a202c; text-align: right; font-size: 0.9em; }

        .contact-btn {
            width: 100%;
            padding: 14px;
            background: #1a202c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 20px;
            transition: background 0.2s;
            font-family: inherit;
        }

        .contact-btn:hover { background: #2d3748; }

        .view-details-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #1a202c;
            border: 2px solid #1a202c;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 12px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .view-details-btn:hover { background: #1a202c; color: white; }

        .no-results {
            text-align: center;
            color: #4a5568;
            font-size: 1.15em;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .no-results p { margin-bottom: 16px; line-height: 1.7; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 36px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            color: #4a5568;
            line-height: 1;
            padding: 4px;
        }

        .modal-close:hover { color: #1a202c; }
        .modal h2 { margin-bottom: 8px; color: #1a202c; font-size: 1.5em; font-weight: 800; }
        .modal-subtitle { color: #4a5568; margin-bottom: 24px; font-size: 1.02em; }

        .modal-route-summary {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .summary-label { font-size: 0.8em; color: #4a5568; margin-bottom: 4px; }
        .summary-value { font-weight: 700; color: #1a202c; font-size: 1.05em; }

        .modal-details-section { margin-bottom: 24px; }
        .modal-details-section h3 { font-size: 1.2em; margin-bottom: 12px; color: #1a202c; font-weight: 700; }
        .modal-details-section p { color: #4a5568; line-height: 1.75; margin-bottom: 12px; }

        .modal-highlights { list-style: none; padding: 0; }
        .modal-highlights li { padding: 8px 0; padding-left: 24px; position: relative; color: #4a5568; line-height: 1.6; }
        .modal-highlights li:before { content: "\2713"; position: absolute; left: 0; color: #38a169; font-weight: bold; }

        .inquire-from-modal-btn {
            width: 100%;
            padding: 14px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 700;
            transition: background 0.2s;
            font-family: inherit;
        }

        .inquire-from-modal-btn:hover { background: #2c5282; }

        .inquiry-form { display: flex; flex-direction: column; gap: 16px; }

        .form-group-modal { display: flex; flex-direction: column; }
        .form-group-modal label { margin-bottom: 6px; font-weight: 600; color: #1a202c; font-size: 0.95em; }

        .form-group-modal input,
        .form-group-modal textarea {
            padding: 10px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group-modal input:focus,
        .form-group-modal textarea:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
        .form-group-modal textarea { min-height: 80px; resize: vertical; }

        .submit-inquiry-btn {
            background: #1a202c;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .submit-inquiry-btn:hover { background: #2d3748; }
        .submit-inquiry-btn:disabled { background: #cbd5e0; cursor: not-allowed; }

        .success-message { display: none; text-align: center; padding: 28px; }
        .success-message.active { display: block; }
        .success-message h3 { color: #38a169; font-size: 1.3em; margin-bottom: 12px; }
        .success-message p { color: #4a5568; line-height: 1.6; }

        @media (max-width: 768px) {
            .filter-row, .filter-row.second-row { grid-template-columns: 1fr; gap: 12px; }
            .routes-grid { grid-template-columns: 1fr; }
            .route-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .price-container { align-items: flex-start; }
            .detail-row { grid-template-columns: 1fr; gap: 4px; }
            .detail-value { text-align: left; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main id="main-content">
        <div class="container">
            <h1 class="section-title" style="margin-top: 20px;">Pool Routes for Sale</h1>
            <p class="section-intro">Browse available pool service routes and find your next business opportunity</p>

            <div class="filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="searchCity">Search City</label>
                        <input type="text" id="searchCity" placeholder="Enter city name">
                    </div>
                    <div class="filter-group">
                        <label for="filterState">State</label>
                        <select id="filterState">
                            <option value="">All States</option>
                        </select>
                    </div>
                    <div class="filter-pair">
                        <div class="filter-group">
                            <label for="minPrice">Min Price</label>
                            <input type="number" id="minPrice" placeholder="$0">
                        </div>
                        <div class="filter-group">
                            <label for="maxPrice">Max Price</label>
                            <input type="number" id="maxPrice" placeholder="Any">
                        </div>
                    </div>
                </div>
                <div class="filter-row second-row">
                    <div class="filter-pair">
                        <div class="filter-group">
                            <label for="minAccounts">Min Accounts</label>
                            <input type="number" id="minAccounts" placeholder="0">
                        </div>
                        <div class="filter-group">
                            <label for="maxAccounts">Max Accounts</label>
                            <input type="number" id="maxAccounts" placeholder="Any">
                        </div>
                    </div>
                    <div class="filter-pair">
                        <div class="filter-group">
                            <label for="minRevenue">Min Annual Revenue</label>
                            <input type="number" id="minRevenue" placeholder="$0">
                        </div>
                        <div class="filter-group">
                            <label for="maxRevenue">Max Annual Revenue</label>
                            <input type="number" id="maxRevenue" placeholder="Any">
                        </div>
                    </div>
                    <div class="filter-group">
                        <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
                    </div>
                </div>
            </div>

            <div class="results-count" id="resultsCount"></div>
            <div class="routes-grid" id="routesGrid"></div>
        </div>

        <!-- Inquiry Modal -->
        <div class="modal" id="inquiryModal" role="dialog" aria-labelledby="inquiryModalTitle" aria-modal="true">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal('inquiryModal')" aria-label="Close">&times;</button>
                <div id="formContainer">
                    <h2 id="inquiryModalTitle">Inquire About Route</h2>
                    <p class="modal-subtitle">Route ID: <strong id="modalListingId"></strong></p>
                    <form class="inquiry-form" name="route-inquiry" action="https://formsubmit.co/info@poolsidebrokers.com" method="POST" onsubmit="handleSubmit(event)">
                        <input type="hidden" name="_subject" value="Route Inquiry from Poolside website">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_next" value="https://poolsidebrokers.com/routes-for-sale">
                        <input type="hidden" name="listing-id" id="formListingId">
                        <div class="form-group-modal">
                            <label for="inquiryName">Name *</label>
                            <input type="text" id="inquiryName" name="name" required>
                        </div>
                        <div class="form-group-modal">
                            <label for="inquiryEmail">Email *</label>
                            <input type="email" id="inquiryEmail" name="email" required>
                        </div>
                        <div class="form-group-modal">
                            <label for="inquiryPhone">Phone *</label>
                            <input type="tel" id="inquiryPhone" name="phone" required>
                        </div>
                        <div class="form-group-modal">
                            <label for="inquiryMessage">Message</label>
                            <textarea id="inquiryMessage" name="message" placeholder="Tell us about your interest in this route..."></textarea>
                        </div>
                        <button type="submit" class="submit-inquiry-btn" id="inquirySubmitBtn">Send Inquiry</button>
                    </form>
                </div>
                <div class="success-message" id="inquirySuccessMessage">
                    <h3>Inquiry Sent!</h3>
                    <p>Thank you for your interest. We'll review your inquiry and get back to you within 24 hours.</p>
                </div>
            </div>
        </div>

        <!-- Details Modal -->
        <div class="modal" id="detailsModal" role="dialog" aria-labelledby="detailsListingId" aria-modal="true">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal('detailsModal')" aria-label="Close">&times;</button>
                <h2 id="detailsListingId"></h2>
                <div class="modal-route-summary" id="detailsSummary"></div>
                <div class="modal-details-section">
                    <h3>About This Route</h3>
                    <p id="detailsDescription"></p>
                </div>
                <div class="modal-details-section">
                    <h3>Key Highlights</h3>
                    <ul class="modal-highlights" id="detailsHighlights"></ul>
                </div>
                <button class="inquire-from-modal-btn" onclick="inquireFromDetails()">Inquire About This Route</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="common.js"></script>
    <script>
    // Route data - add routes here as they become available
    const routes = [];

    // Format currency
    function formatCurrency(num) {
        return '$' + num.toLocaleString();
    }

    // Populate state filter
    function populateStates() {
        const states = [...new Set(routes.map(r => r.state))].sort();
        const select = document.getElementById('filterState');
        states.forEach(state => {
            const opt = document.createElement('option');
            opt.value = state;
            opt.textContent = state;
            select.appendChild(opt);
        });
    }

    // Filter routes
    function filterRoutes() {
        const city = document.getElementById('searchCity').value.toLowerCase();
        const state = document.getElementById('filterState').value;
        const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
        const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
        const minAccounts = parseInt(document.getElementById('minAccounts').value) || 0;
        const maxAccounts = parseInt(document.getElementById('maxAccounts').value) || Infinity;
        const minRevenue = parseInt(document.getElementById('minRevenue').value) || 0;
        const maxRevenue = parseInt(document.getElementById('maxRevenue').value) || Infinity;

        return routes.filter(r => {
            if (city && !r.city.toLowerCase().includes(city)) return false;
            if (state && r.state !== state) return false;
            if (r.price < minPrice || r.price > maxPrice) return false;
            if (r.accounts < minAccounts || r.accounts > maxAccounts) return false;
            if (r.annualRevenue < minRevenue || r.annualRevenue > maxRevenue) return false;
            return true;
        });
    }

    // Render route card
    function renderRouteCard(route) {
        return `
            <div class="route-card">
                <div class="route-header">
                    <div class="listing-id-container">
                        <span class="listing-label">Listing</span>
                        <span class="listing-id">${route.id}</span>
                    </div>
                    <div class="price-container">
                        <span class="price-label">Asking Price</span>
                        <span class="price">${formatCurrency(route.price)}</span>
                    </div>
                </div>
                <div class="route-body">
                    <div class="route-details">
                        <div class="detail-row">
                            <span class="detail-label">Location</span>
                            <span class="detail-value">${route.city}, ${route.state}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Accounts</span>
                            <span class="detail-value">${route.accounts}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Monthly Revenue</span>
                            <span class="detail-value">${formatCurrency(route.monthlyRevenue)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Annual Revenue</span>
                            <span class="detail-value">${formatCurrency(route.annualRevenue)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Service Type</span>
                            <span class="detail-value">${route.serviceType}</span>
                        </div>
                    </div>
                    <button class="contact-btn" onclick="openInquiry('${route.id}')">Inquire Now</button>
                    <button class="view-details-btn" onclick="openDetails('${route.id}')">View Details</button>
                </div>
            </div>`;
    }

    // Render routes
    function renderRoutes() {
        const filtered = filterRoutes();
        const grid = document.getElementById('routesGrid');
        const count = document.getElementById('resultsCount');

        if (routes.length === 0) {
            count.textContent = '';
            grid.innerHTML = `
                <div class="no-results" style="grid-column: 1 / -1;">
                    <h3 style="font-size: 1.4em; color: #1a202c; margin-bottom: 16px;">New Listings Coming Soon</h3>
                    <p>We're currently working with sellers to bring new pool routes to market. Routes are added regularly as they become available.</p>
                    <p style="margin-bottom: 24px;">Want to be notified when new routes are listed? Contact us and we'll reach out as soon as a route matching your criteria becomes available.</p>
                    <a href="/contact" class="cta-btn" style="display: inline-block;">Get Notified of New Routes</a>
                </div>`;
            return;
        }

        count.textContent = `Showing ${filtered.length} of ${routes.length} route${routes.length !== 1 ? 's' : ''}`;

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results" style="grid-column: 1 / -1;"><p>No routes match your current filters. Try adjusting your search criteria.</p></div>';
            return;
        }

        grid.innerHTML = filtered.map(renderRouteCard).join('');
    }

    // Open inquiry modal
    function openInquiry(listingId) {
        document.getElementById('modalListingId').textContent = listingId;
        document.getElementById('formListingId').value = listingId;
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('inquirySuccessMessage').classList.remove('active');
        document.getElementById('inquiryModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // Open details modal
    function openDetails(listingId) {
        const route = routes.find(r => r.id === listingId);
        if (!route) return;

        document.getElementById('detailsListingId').textContent = route.id;
        document.getElementById('detailsDescription').textContent = route.description;

        document.getElementById('detailsSummary').innerHTML = `
            <div><div class="summary-label">Location</div><div class="summary-value">${route.city}, ${route.state}</div></div>
            <div><div class="summary-label">Asking Price</div><div class="summary-value">${formatCurrency(route.price)}</div></div>
            <div><div class="summary-label">Accounts</div><div class="summary-value">${route.accounts}</div></div>
            <div><div class="summary-label">Monthly Revenue</div><div class="summary-value">${formatCurrency(route.monthlyRevenue)}</div></div>
            <div><div class="summary-label">Annual Revenue</div><div class="summary-value">${formatCurrency(route.annualRevenue)}</div></div>
            <div><div class="summary-label">Service Type</div><div class="summary-value">${route.serviceType}</div></div>`;

        document.getElementById('detailsHighlights').innerHTML =
            route.highlights.map(h => `<li>${h}</li>`).join('');

        document.getElementById('detailsModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        window._currentDetailsRoute = listingId;
    }

    // Close modal
    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
        document.body.style.overflow = '';
    }

    // Inquire from details modal
    function inquireFromDetails() {
        closeModal('detailsModal');
        if (window._currentDetailsRoute) {
            openInquiry(window._currentDetailsRoute);
        }
    }

    // Handle form submit
    function handleSubmit(event) {
        // Let the form submit naturally to formsubmit.co
        // The _next hidden field will redirect back to this page
    }

    // Reset filters
    function resetFilters() {
        document.getElementById('searchCity').value = '';
        document.getElementById('filterState').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('minAccounts').value = '';
        document.getElementById('maxAccounts').value = '';
        document.getElementById('minRevenue').value = '';
        document.getElementById('maxRevenue').value = '';
        renderRoutes();
    }

    // Close modal on backdrop click
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('modal')) {
            e.target.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal.active').forEach(m => {
                m.classList.remove('active');
            });
            document.body.style.overflow = '';
        }
    });

    // Add filter listeners
    document.addEventListener('DOMContentLoaded', function() {
        populateStates();
        renderRoutes();

        // Live filtering
        ['searchCity', 'filterState', 'minPrice', 'maxPrice', 'minAccounts', 'maxAccounts', 'minRevenue', 'maxRevenue'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', renderRoutes);
            if (el) el.addEventListener('change', renderRoutes);
        });
    });
    </script>
</body>
</html>
