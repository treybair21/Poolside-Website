    <style>

        .logo img {

        .nav-links {

            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 1em;
            transition: border-color 0.3s;
            background: white;
            color: #2d3748;
        }

        .filter-group input::placeholder,
        .filter-group select option[value=""] {
            color: #a0aec0;
        }

        .filter-group select {
            color: #a0aec0;
        }

        .filter-group select:not([value=""]) {

        }

        .filter-group select option:not([value=""]) {

            padding: 0;

        .detail-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95em;
        }

        .detail-value {
            font-weight: 600;
            color: #2d3748;
            text-align: right;
            font-size: 0.95em;
        }

        .contact-btn {

            padding: 15px;
            background: #2d3748;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .contact-btn:hover {
            background: #1a202c;
        }

        .view-details-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #2d3748;
            border: 2px solid #2d3748;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            margin-top: 15px;

        }

        .view-details-btn:hover {
            background: #2d3748;
            color: white;
        }

        .route-details-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;

        .route-details-section h4 {

            margin-bottom: 12px;
            color: #2d3748;
        }

            color: #4a5568;
            line-height: 1.7;
            font-size: 0.95em;
        }

        .route-highlights {
            margin-top: 15px;
        }

            list-style: none;
            padding-left: 0;
        }

        .route-highlights li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            color: #4a5568;
        }

        .route-highlights li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #4299e1;
            font-weight: bold;
            font-size: 1.2em;
        }

        .no-results {
            text-align: center;
            color: #4a5568;
            font-size: 1.3em;
            padding: 60px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            animation: fadeIn 0.3s;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            position: relative;
            animation: slideUp 0.3s;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: #4a5568;
            line-height: 1;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #2d3748;
        }

        .modal h2 {
            margin-bottom: 10px;
            color: #2d3748;
            font-size: 1.8em;
        }

        .modal-route-summary {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .modal-route-summary .summary-item {
            display: flex;
            flex-direction: column;
        }

        .modal-route-summary .summary-label {
            font-size: 0.85em;
            color: #4a5568;
            margin-bottom: 4px;
        }

        .modal-route-summary .summary-value {
            font-weight: 600;
            color: #2d3748;
            font-size: 1.1em;
        }

        .modal-details-section {
            margin-bottom: 30px;
        }

        .modal-details-section h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #2d3748;
        }

        .modal-details-section p {
            color: #4a5568;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .modal-highlights {
            list-style: none;
            padding: 0;
        }

        .modal-highlights li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: #4a5568;
            line-height: 1.6;
        }

        .modal-highlights li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #48bb78;
            font-weight: bold;
        }

        .inquire-from-modal-btn {
            width: 100%;
            padding: 15px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 700;
            transition: background 0.3s;
        }

        .inquire-from-modal-btn:hover {
            background: #3182ce;
        }

        .modal-subtitle {
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .inquiry-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group-modal {
            display: flex;
            flex-direction: column;
        }

        .form-group-modal label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .form-group-modal input,
        .form-group-modal textarea {
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group-modal input:focus,
        .form-group-modal textarea:focus {
            outline: none;
            border-color: #4299e1;
        }

        .form-group-modal textarea {
            min-height: 100px;
            resize: vertical;
        }

        .submit-inquiry-btn {
            background: #2d3748;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-inquiry-btn:hover {
            background: #1a202c;
        }

        .submit-inquiry-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .success-message.active {
            display: block;
        }

        .success-message h3 {
            color: #48bb78;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .success-message p {
            color: #4a5568;
            line-height: 1.6;
        }

        /* Footer */
        footer {
            background: #2d3748;
            color: white;
            padding: 60px 40px 30px;
            margin-top: 60px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-section h3 {
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-section a:hover {
            color: white;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #2d3748;
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            nav {
                padding: 15px 20px;
            }

            .mobile-menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 20px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .page-title {
                font-size: 1.8em;
            }

            .filters {
                padding: 20px;
            }

            .filter-row,
            .filter-row.second-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .filter-pair {
                grid-template-columns: 1fr 1fr;
            }

            .routes-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .route-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .price-container {
                align-items: flex-start;
            }

            .detail-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .detail-value {
                text-align: left;
            }

            .footer-content {
                grid-template-columns: 1fr;
            }
        }

        /* Desktop optimization */
        @media (min-width: 1200px) {
            .routes-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 900px) and (max-width: 1199px) {
            .routes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Tablet optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .filter-row {
                grid-template-columns: 1fr 1fr;
            }

            .filter-row.second-row {
                grid-template-columns: 1fr 1fr;
            }

            .filter-pair {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="container">
        <h1 class="page-title">Pool Routes for Sale</h1>
        <p class="page-subtitle">Browse available pool service routes and find your next business opportunity</p>

        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="searchCity">Search City</label>
                    <input type="text" id="searchCity" placeholder="Enter city name">
                </div>
                <div class="filter-group">
                    <label for="filterState">State</label>
                    <select id="filterState">
                        <option value="">All States</option>
                    </select>
                </div>
                <div class="filter-pair">
                    <div class="filter-group">
                        <label for="minPrice">Min Price</label>
                        <input type="number" id="minPrice" placeholder="$0">
                    </div>
                    <div class="filter-group">
                        <label for="maxPrice">Max Price</label>
                        <input type="number" id="maxPrice" placeholder="Any">
                    </div>
                </div>
            </div>
            <div class="filter-row second-row">
                <div class="filter-pair">
                    <div class="filter-group">
                        <label for="minAccounts">Min Accounts</label>
                        <input type="number" id="minAccounts" placeholder="0">
                    </div>
                    <div class="filter-group">
                        <label for="maxAccounts">Max Accounts</label>
                        <input type="number" id="maxAccounts" placeholder="Any">
                    </div>
                </div>
                <div class="filter-pair">
                    <div class="filter-group">
                        <label for="minRevenue">Min Annual Revenue</label>
                        <input type="number" id="minRevenue" placeholder="$0">
                    </div>
                    <div class="filter-group">
                        <label for="maxRevenue">Max Annual Revenue</label>
                        <input type="number" id="maxRevenue" placeholder="Any">
                    </div>
                </div>
                <div class="filter-group">
                    <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
                </div>
            </div>
        </div>

        <div class="results-count" id="resultsCount"></div>
        
        <div class="routes-grid" id="routesGrid"></div>
    </div>

    <!-- Inquiry Modal -->
    <div class="modal" id="inquiryModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('inquiryModal')">&times;</button>
            
            <div id="formContainer">
                <h2>Inquire About Route</h2>
                <p class="modal-subtitle">Route ID: <strong id="modalListingId"></strong></p>
                
                <form class="inquiry-form" name="route-inquiry" method="POST" data-netlify="true" onsubmit="handleSubmit(event)">
                    <input type="hidden" name="form-name" value="route-inquiry">
                    <input type="hidden" name="listing-id" id="formListingId">
                    
                    <div class="form-group-modal">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group-modal">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group-modal">
                        <label for="phone">Phone *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group-modal">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Tell us about your interest in this route..."></textarea>
                    </div>
                    
                    <button type="submit" class="submit-inquiry-btn" id="submitBtn">Send Inquiry</button>
                </form>
            </div>

            <div class="success-message" id="successMessage">
                <h3>✓ Inquiry Sent!</h3>
                <p>Thank you for your interest. We'll review your inquiry and get back to you within 24 hours.</p>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('detailsModal')">&times;</button>
            
            <h2 id="detailsListingId"></h2>
            
            <div class="modal-route-summary" id="detailsSummary"></div>
            
            <div class="modal-details-section">
                <h3>About This Route</h3>
                <p id="detailsDescription"></p>
            </div>
            
            <div class="modal-details-section">
                <h3>Key Highlights</h3>
                <ul class="modal-highlights" id="detailsHighlights"></ul>
            </div>
            
            <button class="inquire-from-modal-btn" onclick="inquireFromDetails()">
                Inquire About This Route
            </button>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script>
        // Change select text color when value changes
        document.addEventListener('DOMContentLoaded', function() {
            const filterState = document.getElementById('filterState');
            
            if (filterState) {
                filterState.addEventListener('change', function() {
                    if (this.value === '') {
                        this.style.color = '#a0aec0'; // Grey for placeholder
                    } else {
                        this.style.color = '#2d3748'; // Dark for selected value
                    }
                });
                
                // Set initial color on page load
                if (filterState.value === '') {
                    filterState.style.color = '#a0aec0';
                }
            }
        });
    </script>
    <script src="common.js"></script>
</body>
